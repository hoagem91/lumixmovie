<app-header></app-header>
<div class="page-container loading-container" *ngIf="loading">
  <div class="spinner"></div>
  <p>Đang tải dữ liệu phim...</p>
</div>
<div class="page-container error-container" *ngIf="!loading && error">
  <i class="fas fa-exclamation-triangle"></i>
  <p>{{ error }}</p>
  <button (click)="loadPageData()">Thử lại</button>
</div>
<div class="streaming-app">
  <app-hero-section [movies]="releaseMovies"></app-hero-section>

  <div class="content-sections">
    <div class="tag-section">Phim & Shows</div>
    <app-movie-carousel
      title="Phim đề xuất cho bạn"
      [movies]="proposeMovies">
    </app-movie-carousel>
    <app-movie-carousel
      title="Phim mới phát hành"
      [movies]="releaseMovies">
    </app-movie-carousel>
    <app-movie-carousel
      title="Phim xu hướng"
      [movies]="trendingMovies">
    </app-movie-carousel>
    <app-movie-carousel
      title="Phim phổ biến"
      [movies]="popularMovies">
    </app-movie-carousel>
    <app-movie-carousel
      title="Phim tình cảm"
      [movies]="romanticMovies">
    </app-movie-carousel>
    <app-movie-carousel
      title="Phim hành động"
      [movies]="actionMovies">
    </app-movie-carousel>
    <app-movie-carousel
      title="Phim hài hước"
      [movies]="funnyMovies">
    </app-movie-carousel>
    <app-movie-carousel
      title="Phim hoạt hình"
      [movies]="cartoonMovies">
    </app-movie-carousel>
  </div>
</div>
<app-footer></app-footer>
